<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#02040a">
  <title>Live Market Watch</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #02040a;
      --text: #ffffff;
      --muted: #c9d3e6;
      --price: #ffe45c;
      --accent: #31f5ff;
      --hot: #37ff9b;
      --insane: #ff4fd8;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        linear-gradient(180deg, #07101e 0%, var(--bg) 52%, #03060d 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100svh;
    }

    .live-view-stage {
      width: 100%;
      min-height: 100svh;
      display: flex;
      justify-content: center;
      background: rgba(2, 4, 10, 0.42);
    }

    .live-view-card {
      position: relative;
      width: min(100%, 1080px);
      height: 100svh;
      display: grid;
      grid-template-rows: 70svh 30svh;
      isolation: isolate;
      opacity: 1;
      transition: opacity 420ms ease, transform 420ms ease, filter 420ms ease;
    }

    .live-view-card.is-fading {
      opacity: 0;
      transform: translateY(20px) scale(0.992);
      filter: blur(6px);
    }

    .live-indicator {
      position: absolute;
      z-index: 4;
      top: max(22px, env(safe-area-inset-top));
      right: 34px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 11px 17px;
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 999px;
      background: rgba(2, 4, 10, 0.72);
      color: #ffffff;
      font-size: 22px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: 0;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
      backdrop-filter: blur(16px);
    }

    .live-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #ff3b64;
      box-shadow: 0 0 18px rgba(255, 59, 100, 0.72);
      animation: live-dot-breathe 1s ease-in-out infinite;
    }

    .image-stage {
      position: relative;
      height: 70svh;
      padding: 34px 46px 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .scan-label {
      position: absolute;
      z-index: 3;
      top: 46px;
      left: 62px;
      padding: 10px 15px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      background: rgba(2, 4, 10, 0.48);
      color: rgba(255, 255, 255, 0.72);
      font-size: 20px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0;
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.24);
      backdrop-filter: blur(14px);
    }

    .radar-field {
      position: absolute;
      z-index: 0;
      width: min(96vw, 920px);
      aspect-ratio: 1;
      border-radius: 50%;
      opacity: 0.34;
      background:
        radial-gradient(circle, rgba(49, 245, 255, 0.2) 0 1px, transparent 2px 100%),
        radial-gradient(circle, transparent 0 26%, rgba(49, 245, 255, 0.12) 26.4% 26.8%, transparent 27.2% 42%, rgba(151, 98, 255, 0.12) 42.4% 42.8%, transparent 43.2% 58%, rgba(55, 255, 155, 0.1) 58.4% 58.8%, transparent 59.2% 100%),
        conic-gradient(from 0deg, rgba(49, 245, 255, 0.22), rgba(151, 98, 255, 0.11), rgba(55, 255, 155, 0.18), transparent 35%, transparent 100%);
      animation: radar-rotate 26s linear infinite;
      pointer-events: none;
    }

    .radar-field::before {
      content: "";
      position: absolute;
      inset: 12%;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.07);
      box-shadow:
        0 0 34px rgba(49, 245, 255, 0.12),
        inset 0 0 46px rgba(151, 98, 255, 0.08);
    }

    .radar-field::after {
      content: "";
      position: absolute;
      inset: 50% 50% 0 50%;
      width: 50%;
      height: 2px;
      transform-origin: left center;
      background: linear-gradient(90deg, rgba(49, 245, 255, 0.38), transparent);
      box-shadow: 0 0 24px rgba(49, 245, 255, 0.22);
    }

    .scan-ping {
      position: absolute;
      inset: 38%;
      border: 2px solid rgba(49, 245, 255, 0.34);
      border-radius: 50%;
      opacity: 0;
      transform: scale(0.2);
    }

    .radar-field.is-pinging .scan-ping-one {
      animation: scan-pulse 1.1s ease-out 1;
    }

    .radar-field.is-pinging .scan-ping-two {
      animation: scan-pulse 1.1s ease-out 0.22s 1;
    }

    .scan-dot {
      position: absolute;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(49, 245, 255, 0.46);
      box-shadow: 0 0 18px rgba(49, 245, 255, 0.34);
      opacity: 0.32;
    }

    .scan-dot-one {
      top: 26%;
      left: 32%;
      animation: scan-dot-drift-one 16s ease-in-out infinite alternate;
    }

    .scan-dot-two {
      top: 58%;
      left: 72%;
      background: rgba(55, 255, 155, 0.4);
      box-shadow: 0 0 18px rgba(55, 255, 155, 0.26);
      animation: scan-dot-drift-two 19s ease-in-out infinite alternate;
    }

    .scan-dot-three {
      top: 76%;
      left: 42%;
      background: rgba(151, 98, 255, 0.42);
      box-shadow: 0 0 18px rgba(151, 98, 255, 0.3);
      animation: scan-dot-drift-three 22s ease-in-out infinite alternate;
    }

    .image-shell {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255, 255, 255, 0.14);
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.035);
      box-shadow: 0 34px 110px rgba(0, 0, 0, 0.68);
      overflow: hidden;
    }

    .image-shell::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      border: 1px solid rgba(255, 255, 255, 0.12);
      pointer-events: none;
    }

    .image-shell.is-hot {
      border-color: rgba(55, 255, 155, 0.58);
      box-shadow:
        0 0 42px rgba(55, 255, 155, 0.34),
        0 34px 110px rgba(0, 0, 0, 0.7);
    }

    .image-shell.is-insane {
      border-color: rgba(255, 79, 216, 0.7);
      box-shadow:
        0 0 54px rgba(255, 79, 216, 0.45),
        0 0 90px rgba(49, 245, 255, 0.22),
        0 34px 110px rgba(0, 0, 0, 0.72);
    }

    .listing-image {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 24px 42px rgba(0, 0, 0, 0.55));
      transform-origin: center;
      animation: image-slow-drift 7s ease-out both;
    }

    .listing-image.is-resetting {
      animation: none;
    }

    .image-fallback {
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 50px;
      color: #ffffff;
      font-size: 60px;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
      background: linear-gradient(135deg, rgba(49, 245, 255, 0.14), rgba(255, 228, 92, 0.1));
    }

    .signal-badge {
      position: absolute;
      top: 28px;
      left: 28px;
      display: none;
      padding: 16px 24px;
      border: 2px solid rgba(255, 255, 255, 0.34);
      border-radius: 999px;
      background: rgba(2, 4, 10, 0.8);
      color: #ffffff;
      font-size: 34px;
      line-height: 1;
      font-weight: 1000;
      letter-spacing: 0;
      text-transform: uppercase;
      text-shadow: 0 0 22px rgba(255, 255, 255, 0.24);
    }

    .signal-badge.is-visible {
      display: inline-flex;
    }

    .signal-badge.is-high {
      color: var(--hot);
      border-color: rgba(55, 255, 155, 0.72);
      box-shadow: 0 0 28px rgba(55, 255, 155, 0.32);
    }

    .signal-badge.is-insane {
      color: #ffffff;
      border-color: rgba(255, 79, 216, 0.82);
      box-shadow: 0 0 36px rgba(255, 79, 216, 0.42);
      background: rgba(84, 14, 78, 0.82);
    }

    .listing-info {
      min-height: 0;
      padding: 0 58px 52px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 18px;
      text-align: center;
    }

    .listing-title {
      margin: 0;
      color: #ffffff;
      font-size: 64px;
      line-height: 1.04;
      font-weight: 950;
      letter-spacing: 0;
      overflow-wrap: anywhere;
      text-wrap: balance;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      text-shadow: 0 4px 24px rgba(0, 0, 0, 0.58);
    }

    .listing-price {
      margin: 0;
      color: var(--price);
      font-size: 132px;
      line-height: 0.92;
      font-weight: 1000;
      letter-spacing: 0;
      overflow-wrap: anywhere;
      transform-origin: center;
      text-shadow:
        0 0 22px rgba(255, 228, 92, 0.42),
        0 8px 34px rgba(0, 0, 0, 0.78);
      animation: price-soft-pulse 2s ease-in-out infinite;
    }

    .listing-price.is-resetting {
      animation: none;
    }

    .listing-meta {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      color: var(--muted);
      font-size: 34px;
      line-height: 1.18;
      font-weight: 800;
      letter-spacing: 0;
    }

    .listing-meta strong {
      color: var(--accent);
      font-weight: 950;
    }

    .meta-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--price);
      box-shadow: 0 0 18px rgba(255, 228, 92, 0.5);
      flex: 0 0 auto;
    }

    .status-line {
      min-height: 40px;
      color: rgba(255, 255, 255, 0.82);
      font-size: 30px;
      line-height: 1.15;
      font-weight: 850;
      letter-spacing: 0;
      transition: opacity 260ms ease, transform 260ms ease;
    }

    .status-line.is-changing {
      opacity: 0;
      transform: translateY(8px);
    }

    .activity-overlay {
      position: absolute;
      z-index: 4;
      top: calc(70svh - 92px);
      left: 50%;
      max-width: calc(100% - 92px);
      padding: 13px 18px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      background: rgba(2, 4, 10, 0.7);
      color: rgba(255, 255, 255, 0.9);
      font-size: 24px;
      line-height: 1.1;
      font-weight: 850;
      letter-spacing: 0;
      white-space: nowrap;
      opacity: 0;
      transform: translate(-50%, 10px) scale(0.98);
      transition: opacity 260ms ease, transform 260ms ease;
      pointer-events: none;
      box-shadow: 0 16px 46px rgba(0, 0, 0, 0.42);
      backdrop-filter: blur(16px);
    }

    .activity-overlay.is-visible {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }

    .empty-state {
      width: min(100%, 1080px);
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 70px;
      text-align: center;
    }

    .empty-state h1 {
      margin: 0 0 20px;
      font-size: 76px;
      line-height: 1;
    }

    .empty-state p {
      margin: 0;
      color: var(--muted);
      font-size: 36px;
      line-height: 1.25;
      font-weight: 800;
    }

    @media (max-width: 700px) {
      .image-stage {
        padding: 20px 18px 10px;
      }

      .scan-label {
        top: 18px;
        left: 24px;
        padding: 8px 11px;
        font-size: 13px;
      }

      .radar-field {
        width: 128vw;
      }

      .image-shell {
        border-radius: 20px;
      }

      .listing-info {
        padding: 0 22px 30px;
        gap: 12px;
      }

      .listing-title {
        font-size: 40px;
      }

      .listing-price {
        font-size: 76px;
      }

      .listing-meta {
        gap: 10px;
        font-size: 20px;
      }

      .signal-badge {
        top: 16px;
        left: 16px;
        padding: 10px 15px;
        font-size: 20px;
      }

      .live-indicator {
        top: max(14px, env(safe-area-inset-top));
        right: 16px;
        padding: 9px 13px;
        font-size: 15px;
      }

      .status-line {
        min-height: 26px;
        font-size: 16px;
      }

      .activity-overlay {
        top: calc(70svh - 58px);
        max-width: calc(100% - 36px);
        padding: 9px 12px;
        font-size: 15px;
      }

      .image-fallback {
        font-size: 36px;
      }
    }

    @media (max-height: 900px) {
      .listing-title {
        font-size: 44px;
      }

      .listing-price {
        font-size: 86px;
      }

      .listing-meta {
        font-size: 24px;
      }

      .status-line {
        font-size: 22px;
      }

      .activity-overlay {
        font-size: 18px;
      }
    }

    @keyframes image-slow-drift {
      from {
        transform: scale(1) translate3d(0, 0, 0);
      }

      to {
        transform: scale(1.05) translate3d(0, -1%, 0);
      }
    }

    @keyframes price-soft-pulse {
      0%,
      100% {
        transform: scale(1);
        text-shadow:
          0 0 18px rgba(255, 228, 92, 0.34),
          0 8px 34px rgba(0, 0, 0, 0.78);
      }

      50% {
        transform: scale(1.03);
        text-shadow:
          0 0 34px rgba(255, 228, 92, 0.62),
          0 0 64px rgba(255, 228, 92, 0.24),
          0 8px 34px rgba(0, 0, 0, 0.78);
      }
    }

    @keyframes live-dot-breathe {
      0%,
      100% {
        opacity: 0.42;
        transform: scale(0.76);
      }

      50% {
        opacity: 1;
        transform: scale(1.16);
      }
    }

    @keyframes radar-rotate {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes scan-pulse {
      0% {
        opacity: 0.42;
        transform: scale(0.18);
      }

      100% {
        opacity: 0;
        transform: scale(2.8);
      }
    }

    @keyframes scan-dot-drift-one {
      to {
        transform: translate3d(38px, -28px, 0);
      }
    }

    @keyframes scan-dot-drift-two {
      to {
        transform: translate3d(-44px, 32px, 0);
      }
    }

    @keyframes scan-dot-drift-three {
      to {
        transform: translate3d(28px, 38px, 0);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .live-view-card,
      .status-line,
      .activity-overlay {
        transition: none;
      }

      .listing-image,
      .listing-price,
      .live-dot,
      .radar-field,
      .scan-dot {
        animation: none;
      }
    }
  </style>
</head>
<body>
  {% if listings_payload %}
  <main class="live-view-stage" aria-label="TikTok live listing view">
    <article class="live-view-card" data-live-view-card>
      <div class="live-indicator" aria-label="Live status">
        <span class="live-dot" aria-hidden="true"></span>
        <span>LIVE</span>
      </div>
      <div class="activity-overlay" data-activity-overlay>Feed updating...</div>
      <section class="image-stage" aria-label="Listing image">
        <div class="scan-label">Live scan active</div>
        <div class="radar-field" data-radar-field aria-hidden="true">
          <span class="scan-ping scan-ping-one"></span>
          <span class="scan-ping scan-ping-two"></span>
          <span class="scan-dot scan-dot-one"></span>
          <span class="scan-dot scan-dot-two"></span>
          <span class="scan-dot scan-dot-three"></span>
        </div>
        <div class="image-shell" data-image-shell>
          <img class="listing-image" data-listing-image alt="">
          <div class="image-fallback" data-image-fallback>Image incoming</div>
          <div class="signal-badge" data-signal-badge></div>
        </div>
      </section>
      <section class="listing-info" aria-label="Listing details">
        <h1 class="listing-title" data-listing-title></h1>
        <p class="listing-price" data-listing-price></p>
        <div class="listing-meta">
          <strong data-listing-platform></strong>
          <span class="meta-dot" aria-hidden="true"></span>
          <span data-listing-detected></span>
        </div>
        <div class="status-line" data-market-status>This just appeared 👀</div>
      </section>
    </article>
  </main>
  {% else %}
  <main class="empty-state">
    <div>
      <h1>Live feed warming up</h1>
      <p>New listings will appear here as soon as the bot detects them.</p>
    </div>
  </main>
  {% endif %}

  <script>
    window.__LIVE_VIEW_LISTINGS__ = {{ listings_payload|tojson }};
    window.__LIVE_VIEW_CONFIG__ = {
      refreshUrl: {{ refresh_url|tojson }},
      rotationMinMs: {{ rotation_min_ms|tojson }},
      rotationMaxMs: {{ rotation_max_ms|tojson }},
      refreshIntervalMs: {{ refresh_interval_ms|tojson }}
    };
  </script>
  <script>
    (function () {
      const config = window.__LIVE_VIEW_CONFIG__ || {};
      let listings = Array.isArray(window.__LIVE_VIEW_LISTINGS__) ? window.__LIVE_VIEW_LISTINGS__ : [];
      const card = document.querySelector("[data-live-view-card]");
      if (!card || !listings.length) return;

      const imageShell = document.querySelector("[data-image-shell]");
      const image = document.querySelector("[data-listing-image]");
      const imageFallback = document.querySelector("[data-image-fallback]");
      const badge = document.querySelector("[data-signal-badge]");
      const title = document.querySelector("[data-listing-title]");
      const price = document.querySelector("[data-listing-price]");
      const platform = document.querySelector("[data-listing-platform]");
      const detected = document.querySelector("[data-listing-detected]");
      const marketStatus = document.querySelector("[data-market-status]");
      const activityOverlay = document.querySelector("[data-activity-overlay]");
      const radarField = document.querySelector("[data-radar-field]");
      const marketMessages = [
        "This just appeared 👀",
        "Noticed this one",
        "Watching this listing",
        "Seen similar before",
        "Let's see the next one",
        "Feed is moving",
        "New activity detected"
      ];
      const activityMessages = [
        "Feed updating...",
        "Monitoring listings",
        "New activity detected",
        "Market watch active"
      ];

      let currentIndex = 0;
      let marketMessageIndex = 0;
      let activityTimer = null;
      let rotationTimer = null;
      let currentListing = null;

      function randomDelay() {
        const min = Number(config.rotationMinMs || 5000);
        const max = Number(config.rotationMaxMs || 8000);
        return Math.floor(min + Math.random() * Math.max(max - min, 1));
      }

      function secondsAgo(input) {
        const detectedAt = Date.parse(input || "");
        if (!Number.isFinite(detectedAt)) return 0;
        return Math.max(Math.floor((Date.now() - detectedAt) / 1000), 0);
      }

      function compactAgo(input) {
        const seconds = secondsAgo(input);
        if (seconds < 60) return seconds + "s ago";
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return minutes + "m ago";
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return hours + "h ago";
        return Math.floor(hours / 24) + "d ago";
      }

      function updateDetectedLabel() {
        if (!currentListing || !detected) return;
        detected.textContent = compactAgo(currentListing.detected_at);
      }

      function resetMotion() {
        image.classList.add("is-resetting");
        price.classList.add("is-resetting");
        void image.offsetWidth;
        void price.offsetWidth;
        image.classList.remove("is-resetting");
        price.classList.remove("is-resetting");
      }

      function triggerScanPulse() {
        if (!radarField) return;
        radarField.classList.remove("is-pinging");
        void radarField.offsetWidth;
        radarField.classList.add("is-pinging");
        window.setTimeout(function () {
          radarField.classList.remove("is-pinging");
        }, 1500);
      }

      function rotateMarketMessage() {
        if (!marketStatus) return;
        marketMessageIndex = (marketMessageIndex + 1) % marketMessages.length;
        marketStatus.classList.add("is-changing");
        window.setTimeout(function () {
          marketStatus.textContent = marketMessages[marketMessageIndex];
          marketStatus.classList.remove("is-changing");
        }, 260);
      }

      function scheduleActivityOverlay() {
        if (!activityOverlay) return;
        if (activityTimer) window.clearTimeout(activityTimer);

        const delay = 10000 + Math.floor(Math.random() * 10000);
        activityTimer = window.setTimeout(function () {
          const message = activityMessages[Math.floor(Math.random() * activityMessages.length)];
          activityOverlay.textContent = message;
          activityOverlay.classList.add("is-visible");
          window.setTimeout(function () {
            activityOverlay.classList.remove("is-visible");
            scheduleActivityOverlay();
          }, 1600);
        }, delay);
      }

      function normalizeListing(item) {
        const normalized = {
          title: String(item.title || "New listing detected"),
          price: String(item.price || "Price incoming"),
          platform: String(item.platform || "Marketplace"),
          image_url: String(item.image_url || ""),
          detected_at: String(item.detected_at || ""),
          score_label: String(item.score_label || "").toUpperCase()
        };
        normalized.key = [
          normalized.detected_at,
          normalized.platform,
          normalized.title,
          normalized.price,
          normalized.image_url
        ].join("|");
        return normalized;
      }

      function setImage(src, alt) {
        imageFallback.style.display = "none";
        image.style.display = "block";
        image.removeAttribute("src");
        image.alt = alt;

        if (!src) {
          image.style.display = "none";
          imageFallback.style.display = "flex";
          return;
        }

        image.onerror = function () {
          image.style.display = "none";
          imageFallback.style.display = "flex";
        };
        image.src = src;
      }

      function renderListing(item, withTransition) {
        currentListing = normalizeListing(item);

        const apply = function () {
          title.textContent = currentListing.title;
          price.textContent = currentListing.price;
          platform.textContent = currentListing.platform;
          updateDetectedLabel();
          setImage(currentListing.image_url, currentListing.title);
          resetMotion();
          triggerScanPulse();

          const level = currentListing.score_label;
          imageShell.classList.toggle("is-hot", level === "HIGH");
          imageShell.classList.toggle("is-insane", level === "INSANE");
          badge.className = "signal-badge";
          badge.textContent = "";
          if (level === "HIGH" || level === "INSANE") {
            badge.textContent = level;
            badge.classList.add("is-visible", level === "HIGH" ? "is-high" : "is-insane");
          }
        };

        if (!withTransition) {
          apply();
          return;
        }

        card.classList.add("is-fading");
        window.setTimeout(function () {
          apply();
          window.requestAnimationFrame(function () {
            card.classList.remove("is-fading");
          });
        }, 300);
      }

      function rotate() {
        if (listings.length > 1) {
          currentIndex = (currentIndex + 1) % listings.length;
          renderListing(listings[currentIndex], true);
        }
        scheduleRotation();
      }

      function scheduleRotation() {
        if (rotationTimer) window.clearTimeout(rotationTimer);
        rotationTimer = window.setTimeout(rotate, randomDelay());
      }

      async function refreshListings() {
        if (!config.refreshUrl) return;
        try {
          const response = await fetch(config.refreshUrl, {
            credentials: "same-origin",
            headers: { Accept: "application/json" }
          });
          if (!response.ok) return;

          const payload = await response.json();
          const nextListings = Array.isArray(payload.listings) ? payload.listings.map(normalizeListing) : [];
          if (!nextListings.length) return;

          const previousKey = currentListing ? currentListing.key : "";
          const newestKey = nextListings[0].key;
          listings = nextListings;

          if (newestKey && newestKey !== previousKey) {
            currentIndex = 0;
            renderListing(listings[0], true);
            scheduleRotation();
            return;
          }

          const previousIndex = listings.findIndex(function (item) {
            return item.key === previousKey;
          });
          currentIndex = previousIndex >= 0 ? previousIndex : 0;
        } catch (error) {
          console.debug("Live view refresh skipped:", error);
        }
      }

      listings = listings.map(normalizeListing).filter(function (item) {
        return item.key;
      });

      if (!listings.length) return;
      renderListing(listings[0], false);
      scheduleRotation();
      scheduleActivityOverlay();
      window.setInterval(rotateMarketMessage, 5000 + Math.floor(Math.random() * 2000));
      window.setInterval(updateDetectedLabel, 1000);
      window.setInterval(refreshListings, Math.max(Number(config.refreshIntervalMs || 10000), 5000));
    })();
  </script>
</body>
</html>
