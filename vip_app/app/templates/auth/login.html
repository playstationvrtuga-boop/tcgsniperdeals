{% extends "base.html" %}
{% block title %}Log in - TCG Sniper Deals{% endblock %}
{% block content %}
<section class="auth-card">
  <h1>You are back where the edge is.</h1>
  <p>New deals keep landing in real time. Log in now and get in front of the next opportunity.</p>
  <form method="post" class="stack-form">
    <label>Email
      <input type="email" name="email" required autocomplete="email">
    </label>
    <label>Password
      <input type="password" name="password" required autocomplete="current-password">
    </label>
    <button class="primary-button" type="submit">Enter the live feed</button>
  </form>
  <p class="muted">Need VIP access? <a href="{{ url_for('auth.register') }}">Create your account</a>.</p>
</section>
{% endblock %}
