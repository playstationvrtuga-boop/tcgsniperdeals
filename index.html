<!doctype html>
<html lang="en">

      --line: rgba(143, 160, 187, 0.16);
      --text: #f8fbff;
      --muted: #8ea2bd;
      --primary: #5ed0ff;
      --primary-strong: #1fb6ff;
      --shadow: 0 24px 60px rgba(2, 8, 23, 0.42);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;

        linear-gradient(180deg, #08111d 0%, #050b14 100%);

    .card {
      width: min(560px, 100%);
      padding: 32px 28px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(18, 29, 49, 0.97), rgba(11, 20, 35, 0.96));

      text-align: center;
    }

    .logo {

      margin: 0 auto 18px;
      border-radius: 22px;
      display: block;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(94, 208, 255, 0.08);
      color: #def6ff;
      font-size: 0.88rem;
    }

    h1 {
      margin: 16px 0 10px;
      font-size: clamp(2rem, 7vw, 3rem);
      line-height: 1.04;
    }

    p {
      margin: 0 auto;
      max-width: 34rem;
      color: var(--muted);
      line-height: 1.6;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      margin-top: 24px;
      padding: 0 22px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--primary), var(--primary-strong));
      color: #031018;
      text-decoration: none;
      font-weight: 800;
      box-shadow: 0 14px 30px rgba(31, 182, 255, 0.22);
      transition: transform 0.18s ease, opacity 0.18s ease;
    }

    .button:hover {
      transform: translateY(-1px);
    }

    .meta {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.95rem;
