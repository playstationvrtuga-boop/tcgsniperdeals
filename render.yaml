services:
  - type: web
    name: tcg-sniper-deals
    env: python
    plan: starter
    rootDir: vip_app
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --config gunicorn_conf.py wsgi:app
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tcg-sniper-deals-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: BOT_API_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: "1"
      - key: GUNICORN_THREADS
        value: "1"
      - key: GUNICORN_TIMEOUT
        value: "60"
      - key: GUNICORN_KEEPALIVE
        value: "5"
      - key: RUN_STARTUP_SCHEMA_CHECK
        value: "true"
      - key: RUN_DB_CREATE_ALL
        value: "false"
      - key: LOG_STARTUP_TIMING
        value: "true"
      - key: LOG_FEED_TIMING
        value: "false"
      - key: FEED_CACHE_TTL_SECONDS
        value: "5"
      - key: FEED_OPTIONS_CACHE_TTL_SECONDS
        value: "60"
      - key: FEED_POLL_INTERVAL_MS
        value: "2500"
      - key: FEED_DELTA_MAX_ITEMS
        value: "12"
      - key: ENABLE_LIVE_RADAR
        value: "true"
      - key: ENABLE_TARGET_FEEDBACK
        value: "true"
      - key: ENABLE_CARD_ENTRY_ANIMATIONS
        value: "true"
      - key: ENABLE_RELATIVE_TIME_UPDATES
        value: "true"
      - key: RELATIVE_TIME_UPDATE_MS
        value: "15000"
      - key: DB_POOL_SIZE
        value: "1"
      - key: DB_MAX_OVERFLOW
        value: "1"
      - key: EBAY_CLIENT_ID
        sync: false
      - key: EBAY_CLIENT_SECRET
        sync: false
      - key: EBAY_MARKETPLACE_ID
        value: "EBAY_US"
      - key: EBAY_ENABLE_OFFICIAL_API
        value: "true"
      - key: EBAY_API_ENVIRONMENT
        value: "PRODUCTION"
      - key: EBAY_API_TIMEOUT
        value: "12"
      - key: PRICING_ENABLE_EBAY_HTML_FALLBACK
        value: "false"
      - key: PUBLIC_SITE_URL
        value: "https://tcgsniperdeals.com"
      - key: SITE_URL
        value: "https://tcgsniperdeals.com"
      - key: MOBILE_APP_URL
        value: "https://tcgsniperdeals.com"
      - key: ANDROID_APK_URL
        sync: false
      - key: EBAY_EPN_ENABLED
        value: "true"
      - key: EBAY_EPN_APP_CAMPAIGN_ID
        value: "5339151558"
      - key: EBAY_EPN_WEBSITE_CAMPAIGN_ID
        value: "5339151557"
      - key: EBAY_EPN_VIP_CAMPAIGN_ID
        value: "5339151556"
      - key: EBAY_EPN_TELEGRAM_CAMPAIGN_ID
        value: "5339151554"
      - key: VAPID_SUBJECT
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
  - type: worker
    name: tcg-sniper-deals-worker
    env: python
    plan: starter
    rootDir: vip_app
    buildCommand: pip install -r requirements.txt
    startCommand: python pricing_worker_entry.py
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tcg-sniper-deals-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: FREE_CHAT_ID
        sync: false
      - key: VIP_CHAT_ID
        sync: false
      - key: PUBLIC_SITE_URL
        value: "https://tcgsniperdeals.com"
      - key: SITE_URL
        value: "https://tcgsniperdeals.com"
      - key: MOBILE_APP_URL
        value: "https://tcgsniperdeals.com"
      - key: VAPID_SUBJECT
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: RUN_STARTUP_SCHEMA_CHECK
        value: "true"
      - key: RUN_DB_CREATE_ALL
        value: "false"
      - key: LOG_STARTUP_TIMING
        value: "false"
      - key: DB_POOL_SIZE
        value: "2"
      - key: DB_MAX_OVERFLOW
        value: "1"
      - key: PRICING_DEAL_MIN_DISCOUNT
        sync: false
      - key: PRICING_DEAL_MIN_MARGIN
        sync: false
      - key: PRICING_DEAL_MIN_SCORE
        sync: false
      - key: PRICING_WORKER_MIN_SLEEP
        sync: false
      - key: PRICING_WORKER_MAX_SLEEP
        sync: false
      - key: PRICING_WORKER_ENABLED
        value: "true"
      - key: EBAY_CLIENT_ID
        sync: false
      - key: EBAY_CLIENT_SECRET
        sync: false
      - key: EBAY_MARKETPLACE_ID
        value: "EBAY_US"
      - key: EBAY_ENABLE_OFFICIAL_API
        value: "true"
      - key: EBAY_API_ENVIRONMENT
        value: "PRODUCTION"
      - key: EBAY_API_TIMEOUT
        value: "12"
      - key: PRICING_ENABLE_EBAY_HTML_FALLBACK
        value: "false"
      - key: EBAY_ENABLE_MARKETPLACE_INSIGHTS
        sync: false
      - key: EBAY_MARKETPLACE_INSIGHTS_SEARCH_URL
        sync: false
      - key: EBAY_EPN_ENABLED
        value: "true"
      - key: EBAY_EPN_APP_CAMPAIGN_ID
        value: "5339151558"
      - key: EBAY_EPN_WEBSITE_CAMPAIGN_ID
        value: "5339151557"
      - key: EBAY_EPN_VIP_CAMPAIGN_ID
        value: "5339151556"
      - key: EBAY_EPN_TELEGRAM_CAMPAIGN_ID
        value: "5339151554"
  - type: worker
    name: tcg-sniper-deals-gone-worker
    env: python
    plan: starter
    rootDir: vip_app
    buildCommand: pip install -r requirements.txt
    startCommand: python gone_alert_worker_entry.py
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tcg-sniper-deals-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: FREE_CHAT_ID
        sync: false
      - key: PUBLIC_SITE_URL
        value: "https://tcgsniperdeals.com"
      - key: APP_PUBLIC_URL
        value: "https://tcgsniperdeals.com"
      - key: RUN_STARTUP_SCHEMA_CHECK
        value: "true"
      - key: ENABLE_FREE_GONE_ALERTS
        value: "true"
      - key: FREE_GONE_MIN_PER_DAY
        value: "3"
      - key: FREE_GONE_MAX_PER_DAY
        value: "5"
      - key: FREE_GONE_WINDOWS
        value: "10:00-13:00,15:00-19:00,20:00-23:00"
      - key: FREE_GONE_WORKER_INTERVAL_MINUTES
        value: "10"
      - key: FREE_GONE_MAX_AGE_HOURS
        value: "48"
      - key: FREE_GONE_PREFERRED_AGE_HOURS
        value: "24"
      - key: FREE_GONE_AVAILABILITY_CHECK_LIMIT
        value: "10"
      - key: FREE_GONE_AVAILABILITY_MIN_AGE_MINUTES
        value: "5"
      - key: FREE_GONE_AVAILABILITY_RECHECK_MINUTES
        value: "180"
